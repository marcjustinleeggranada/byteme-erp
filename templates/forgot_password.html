<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="login-container">
    <div class="divider top"></div>
    
    <h1>Reset Password</h1>

    <form action="/forgot-password" method="POST">

        <div class="form-group">
            <div class="input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="username" placeholder="Enter your username" autocomplete="username" required>
            </div>
        </div>

        <div class="form-group">
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" placeholder="Enter new password" required>
            </div>
        </div>

        <button type="submit" class="submit-btn">RESET PASSWORD</button>
    </form>

    <div class="options-wrapper" style="justify-content: center; margin-top: 1.5rem;">
        <a href="/" class="forgot-password">← Back to Login</a>
    </div>

    <div class="divider bottom"></div>
</div>

</body>
</html>
