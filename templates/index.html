<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Byte Me Restaurant — Procurement & Inventory Management</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">

<div class="login-page-shell">
<main class="login-main">

<div class="login-container" id="login-container">

    <div class="login-brand">
        <div class="login-brand-icon"><i class="fa-solid fa-utensils"></i></div>
        <div>
            <div class="login-brand-name">Byte Me</div>
            <div class="login-brand-sub">Restaurant ERP</div>
        </div>
    </div>

    <div class="login-rule"></div>
    <p class="login-system-name">Procurement &amp; Inventory Management System</p>

    <form action="/login" method="POST" class="login-form" id="login-form">
        <section id="role-step" class="login-step">
            <h2 class="login-role-heading">Select your role to sign in</h2>
            <div class="role-cards-grid">
                <div class="role-panel">
                    <div class="role-panel-icon"><i class="fa-solid fa-user-tie"></i></div>
                    <strong>Manager</strong>
                    <button type="button" class="role-login-btn" data-role="manager">Login as Manager <i class="fa-solid fa-arrow-right"></i></button>
                </div>
                <div class="role-panel">
                    <div class="role-panel-icon"><i class="fa-solid fa-box"></i></div>
                    <strong>Inventory Staff</strong>
                    <button type="button" class="role-login-btn" data-role="staff">Login as Staff <i class="fa-solid fa-arrow-right"></i></button>
                </div>
                <div class="role-panel">
                    <div class="role-panel-icon"><i class="fa-solid fa-truck"></i></div>
                    <strong>Supplier</strong>
                    <button type="button" class="role-login-btn" data-role="supplier">Login as Supplier <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>
        </section>

        <section id="credentials-step" class="login-step" hidden>
            <input type="hidden" name="role" id="login-role-input" value="">
            <button type="button" id="back-to-roles" class="step-back">
                <i class="fa-solid fa-arrow-left"></i> Change account type
            </button>
            <h2 id="selected-role-label" class="selected-role-label">Sign In</h2>

            <div class="form-group">
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="username" placeholder="Username" autocomplete="username" required>
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" placeholder="Password" autocomplete="current-password" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">Sign In</button>
        </section>
    </form>

</div>
</main>

<footer class="login-footer">
    <nav class="login-footer-links" aria-label="Login page information">
        <button type="button" data-info-modal="about-us"><i class="fa-solid fa-circle-info"></i> About Us</button>
        <span aria-hidden="true">|</span>
        <button type="button" data-info-modal="terms">Terms and Conditions</button>
        <span aria-hidden="true">|</span>
        <button type="button" data-info-modal="contact-support"><i class="fa-solid fa-headset"></i> Contact Support</button>
    </nav>
    <p class="login-footer-copyright">&copy; 2026 Byte Me Restaurant. All rights reserved.</p>
</footer>
</div>

<div class="login-modal-backdrop" id="login-info-modal" hidden>
    <section class="login-info-modal" role="dialog" aria-modal="true" aria-labelledby="login-modal-title">
        <div class="login-modal-accent"></div>
        <div class="login-modal-header">
            <h2 id="login-modal-title"></h2>
            <button type="button" class="login-modal-x" id="login-modal-x" aria-label="Close dialog"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="login-modal-body" id="login-modal-body"></div>
        <div class="login-modal-actions"><button type="button" class="login-modal-close" id="login-modal-close">Close</button></div>
    </section>
</div>

<template id="about-us-content">
    <p>Byte Me Restaurant ERP is a cloud-based Procurement and Inventory Management System designed to streamline inventory tracking, supplier coordination, procurement processes, and delivery management.</p>
</template>

<template id="terms-content">
    <p>By using this system you agree to follow Byte Me Restaurant procurement policies, protect account credentials, and use inventory and supplier data only for authorized restaurant operations.</p>
</template>

<template id="contact-support-content">
    <p class="login-modal-lead">Need Assistance?</p>
    <dl class="login-contact-list">
        <div><dt>Email</dt><dd><a href="mailto:support@byteme.local">support@byteme.local</a></dd></div>
        <div><dt>Phone</dt><dd>+63 912 345 6789</dd></div>
        <div><dt>Business Hours</dt><dd>Monday - Saturday<br>8:00 AM - 5:00 PM</dd></div>
    </dl>
</template>

<script src="{{ url_for('static', filename='js/password-toggle.js') }}"></script>
<script>
    const roleStep = document.getElementById("role-step");
    const credentialsStep = document.getElementById("credentials-step");
    const loginContainer = document.getElementById("login-container");
    const backButton = document.getElementById("back-to-roles");
    const selectedRoleLabel = document.getElementById("selected-role-label");
    const roleInput = document.getElementById("login-role-input");
    const roleLabels = { manager: "Manager", staff: "Inventory Staff", supplier: "Supplier" };

    document.querySelectorAll(".role-login-btn").forEach(function (button) {
        button.addEventListener("click", function () {
            const role = button.getAttribute("data-role");
            roleInput.value = role;
            selectedRoleLabel.textContent = roleLabels[role] + " Sign In";
            loginContainer.classList.add("credentials-step");
            roleStep.hidden = true;
            credentialsStep.hidden = false;
            credentialsStep.querySelector('input[name="username"]').focus();
            if (window.PasswordToggle) window.PasswordToggle.init(credentialsStep);
        });
    });

    backButton.addEventListener("click", function () {
        credentialsStep.hidden = true;
        roleStep.hidden = false;
        loginContainer.classList.remove("credentials-step");
        roleInput.value = "";
    });

    const modalContent = {
        "about-us": { title: "About Us", template: "about-us-content" },
        "terms": { title: "Terms and Conditions", template: "terms-content" },
        "contact-support": { title: "Contact Support", template: "contact-support-content" },
    };
    const infoModal = document.getElementById("login-info-modal");
    const modalTitle = document.getElementById("login-modal-title");
    const modalBody = document.getElementById("login-modal-body");
    const modalCloseButton = document.getElementById("login-modal-close");
    const modalXButton = document.getElementById("login-modal-x");
    let modalTrigger = null;
    function openInfoModal(key, trigger) {
        const content = modalContent[key];
        if (!content) return;
        modalTrigger = trigger;
        modalTitle.textContent = content.title;
        modalBody.replaceChildren(document.getElementById(content.template).content.cloneNode(true));
        infoModal.hidden = false;
        document.body.classList.add("modal-open");
        modalCloseButton.focus();
    }
    function closeInfoModal() {
        infoModal.hidden = true;
        document.body.classList.remove("modal-open");
        if (modalTrigger) modalTrigger.focus();
    }
    document.querySelectorAll("[data-info-modal]").forEach(function (button) {
        button.addEventListener("click", function () { openInfoModal(button.dataset.infoModal, button); });
    });
    modalCloseButton.addEventListener("click", closeInfoModal);
    modalXButton.addEventListener("click", closeInfoModal);
    infoModal.addEventListener("click", function (e) { if (e.target === infoModal) closeInfoModal(); });
    document.addEventListener("keydown", function (e) { if (e.key === "Escape" && !infoModal.hidden) closeInfoModal(); });
</script>

</body>
</html>
